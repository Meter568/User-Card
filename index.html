<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User card</title>
    <link rel="stylesheet" href="./assets/css/iconsfont.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <i class="fa-regular fa-compass"></i>
                <p>New York City, NY</p>
            </div>
        </div>
        <div class="img-container">
            <img 
                src="./assets/images/pexels-frank-minjarez-333886454-19809475.jpg" 
                alt="Photo"
                class="photo"
            >
        </div>
        <div class="info-container">
            <div class="info-header">
                <h2>Margot Robbie</h2>
                <p>Margot Robbie was born in Dalby, Queensland, Australia and raised on the Gold Coast.</p>
            </div>
            <button>Follow</button>
        </div>
        <div class="footer">
            <div class="icons">
                <i class="fa-regular fa-image"></i>
                <div>
                    <p>Posts</p>
                    <span>605</span>
                </div>
            </div>
            <div class="icons">
                <i class="fa-regular fa-heart"></i>
                <div>
                    <p>Favorites</p>
                    <span>3,422</span>
                </div>
            </div>
            <div class="icons">
                <i class="fa-regular fa-paper-plane paper"></i>
                <div>
                    <p>Messages</p>
                    <span>1,093</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
